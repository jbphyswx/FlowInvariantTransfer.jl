name: CI
on:
  push:
    branches: [main]
    tags: ['*']
  pull_request:
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}
jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    env:
      # Exercise the ThreadedBackend / FFTW-threads paths under real parallelism (the suite is
      # only meaningful with >1 thread; serial-only runs never hit the threaded code).
      JULIA_NUM_THREADS: '2'
    strategy:
      fail-fast: false
      matrix:
        # 1.11 is the floor: Project.toml [sources]/[workspace] (used for the unregistered sibling
        # packages CGEF/HelmholtzDecomposition/FlowFieldSpectra/NUFSHT) require Julia >= 1.11.
        version: ['1.11', '1.12', '1']
        os: [ubuntu-latest]
        arch: [x64]
        include:
          - version: 'nightly'
            os: ubuntu-latest
            arch: x64
    continue-on-error: ${{ matrix.version == 'nightly' }}
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}
      - uses: julia-actions/cache@v2
      - uses: julia-actions/julia-buildpkg@v1
      # The test suite shells out to MPI's bundled mpiexec (`mpiexec -n 2`) for the distributed
      # extensions and exercises the GPU kernels via the KernelAbstractions CPU backend, so no
      # system MPI or GPU is required on the runner.
      - uses: julia-actions/julia-runtest@v1
      - uses: julia-actions/julia-processcoverage@v1
      - uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true

  examples:
    name: Run examples
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1'
      - uses: julia-actions/cache@v2
      - name: Instantiate examples env
        run: julia --project=examples -e 'using Pkg; Pkg.develop(PackageSpec(path=pwd())); Pkg.instantiate()'
      - name: Execute example scripts
        run: |
          for f in examples/*.jl; do
            # flows.jl is a shared include (defines solvers), not a standalone example.
            [ "$(basename "$f")" = "flows.jl" ] && continue
            echo "::group::$f"
            julia --project=examples "$f"
            echo "::endgroup::"
          done
